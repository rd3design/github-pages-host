name: Sync PDFs to Cloudflare R2

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run - fetch but do not upload, just report'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      limit:
        description: 'Max PDFs to process (0 = all)'
        required: false
        default: '0'
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @aws-sdk/client-s3

      - name: Run PDF sync
        env:
          R2_ACCOUNT_ID:    "${{ secrets.R2_ACCOUNT_ID }}"
          R2_ACCESS_KEY_ID: "${{ secrets.R2_ACCESS_KEY_ID }}"
          R2_SECRET_KEY:    "${{ secrets.R2_SECRET_KEY }}"
          R2_BUCKET:        "${{ secrets.R2_BUCKET }}"
          R2_PUBLIC_URL:    "${{ secrets.R2_PUBLIC_URL }}"
          DRY_RUN:          "${{ github.event.inputs.dry_run }}"
          LIMIT:            "${{ github.event.inputs.limit }}"
        run: node .github/scripts/sync-pdfs.js

      - name: Commit updated projects.json
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git diff --staged --quiet || git commit -m "chore: update R2 PDF links [skip ci]"
          git push
