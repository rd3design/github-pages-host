<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDM Project Index — Sterling ATM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c0f; --surface:#111318; --surface2:#181c22;
  --border:#1e2330; --border2:#262d3a;
  --text:#e8edf5; --muted:#5a6478;
  --teal:#00c4b4; --teal-g:linear-gradient(135deg,#00c4b4 0%,#00e676 100%);
  --green:#00e676; --blue:#4fc3f7; --red:#ef5350; --gold:#f5c518;
  --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* top bar */
.top-bar{background:#0d1017;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;z-index:110}
.logo img{height:30px;width:auto}
.header-stats{display:flex;gap:20px;align-items:center}
.stat-pill{font-size:12px;color:var(--muted)}
.stat-pill b{color:var(--teal);font-weight:600}

/* tab bar */
.tab-bar{background:#0d1017;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:flex-end;gap:4px;flex-shrink:0;height:40px}
.tab-btn{background:transparent;border:1px solid transparent;border-bottom:none;color:var(--muted);font-family:var(--sans);font-size:12px;font-weight:500;padding:0 18px;height:34px;cursor:pointer;border-radius:6px 6px 0 0;transition:color .15s,background .15s,border-color .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.tab-btn.active{color:var(--teal);background:var(--surface);border-color:var(--border);border-bottom-color:var(--surface);position:relative;top:1px}
.tab-badge{display:inline-block;background:rgba(0,196,180,.15);color:var(--teal);border:1px solid rgba(0,196,180,.25);border-radius:10px;font-size:9px;font-weight:700;padding:1px 6px;margin-left:6px;vertical-align:middle}
.tab-badge-gold{background:rgba(245,197,24,.15);color:var(--gold);border-color:rgba(245,197,24,.3)}

/* tab pages */
.tab-page{display:none;flex:1;min-height:0;overflow:hidden}
.tab-page.active{display:flex}

/* layout */
.layout{display:grid;grid-template-columns:252px 1fr;width:100%;height:100%;overflow:hidden}

/* sidebar */
aside{background:var(--surface);border-right:1px solid var(--border);padding:18px 14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%}
.filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
input[type="text"],select{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:12px;padding:8px 10px 8px 30px;border-radius:6px;outline:none;transition:border-color .15s,box-shadow .15s;appearance:none}
select{padding-left:10px;cursor:pointer}
input[type="text"]:focus,select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,196,180,.12)}
.btn{width:100%;background:var(--teal-g);color:#000;border:none;font-family:var(--sans);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:9px;border-radius:6px;cursor:pointer;transition:opacity .15s;margin-top:2px}
.btn:hover{opacity:.88}
.btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-secondary:hover{color:var(--text);background:var(--surface2)}
.divider{border:none;border-top:1px solid var(--border);margin:2px 0}

/* main */
main{padding:18px 22px;overflow:hidden;display:flex;flex-direction:column;min-height:0;height:100%}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0}
.result-count{font-size:12px;color:var(--muted)}
.result-count b{color:var(--text)}

/* table */
.table-wrap{border:1px solid var(--border);border-radius:8px;overflow:auto;flex:1;min-height:0}
.table-wrap::-webkit-scrollbar{height:8px;width:8px}
.table-wrap::-webkit-scrollbar-track{background:var(--surface)}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.table-wrap::-webkit-scrollbar-thumb:hover{background:var(--teal)}
table{width:max-content;min-width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--surface);border-bottom:1px solid var(--border2)}
th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:10px;text-align:left;user-select:none;white-space:nowrap;background:var(--surface);position:relative;overflow:hidden;text-overflow:ellipsis}
th.sortable{cursor:pointer}
th.sortable:hover{color:var(--text)}
th.sorted{color:var(--teal)}
th .sa{opacity:.4;margin-left:3px}
th.sorted .sa{opacity:1}
.col-resizer{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;background:transparent;transition:background .15s}
.col-resizer:hover,.col-resizer.dragging{background:var(--teal)}
th:first-child,td:first-child{position:sticky;left:0;z-index:2}
th:first-child{background:var(--surface);z-index:3;border-right:1px solid var(--border2)}
td:first-child{background:var(--bg);border-right:1px solid var(--border2)}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(0,196,180,.04)}
tbody tr:hover td:first-child{background:var(--surface2)}
td{padding:8px 10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td.col-unit{font-size:12px;font-weight:700;color:var(--teal)}
td.col-dim{font-size:11px;color:var(--green);text-align:right}
td.col-muted{font-size:11px;color:var(--muted)}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-type{background:rgba(79,195,247,.12);color:var(--blue);border:1px solid rgba(79,195,247,.2)}
.badge-count{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.badge-tlpn{background:rgba(245,197,24,.1);color:var(--gold);border:1px solid rgba(245,197,24,.2);cursor:default}
td.col-tlpn{text-align:center}
.expand-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0 4px;line-height:1;transition:transform .15s}
.expand-btn.open{transform:rotate(90deg)}
tr.sub-row td{background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted2,#8899aa)}
tr.sub-row td:first-child{padding-left:32px}
tr.sub-row .tlpn-name{color:var(--fg);font-weight:500}
tr.sub-row .bank-name{color:var(--teal);margin-left:8px}
tr.sub-row .render-link{margin-left:8px;color:var(--muted);text-decoration:none;font-size:10px;border:1px solid var(--border2);border-radius:3px;padding:1px 5px}
tr.sub-row .render-link:hover{color:var(--teal);border-color:var(--teal)}
.badge-tlpn{background:rgba(245,197,24,.1);color:var(--gold);border:1px solid rgba(245,197,24,.2);cursor:default}
td.col-tlpn{text-align:center}
.dash{color:var(--border2)}

/* star */
td.col-star{text-align:center;padding:4px 6px}
.star-btn{background:none;border:none;cursor:pointer;font-size:17px;line-height:1;padding:2px 4px;color:var(--border2);transition:color .12s,transform .1s;display:block;margin:auto}
.star-btn:hover{color:var(--gold);transform:scale(1.2)}
.star-btn.starred{color:var(--gold)}

/* detail panel */
#detail-panel{display:none;position:fixed;right:0;top:92px;width:460px;height:calc(100vh - 92px);background:var(--surface);border-left:1px solid var(--border);flex-direction:column;z-index:90;overflow-y:auto}
#detail-panel.open{display:flex}
.panel-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:linear-gradient(135deg,rgba(0,196,180,.07) 0%,rgba(0,230,118,.04) 100%)}
.panel-unit-no{font-size:20px;font-weight:700;background:var(--teal-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.panel-part-no{font-size:12px;color:var(--blue);margin-top:3px}
.panel-client{font-size:12px;color:var(--muted);margin-top:2px}
.close-btn{background:none;border:1px solid var(--border2);color:var(--muted);font-size:14px;width:28px;height:28px;display:grid;place-items:center;cursor:pointer;border-radius:6px;flex-shrink:0;transition:all .15s}
.close-btn:hover{color:var(--text);border-color:var(--teal)}
.panel-meta{padding:14px 22px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}
.meta-item label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.meta-item span{font-size:12px;color:var(--text)}
.dims-row{padding:12px 22px;border-bottom:1px solid var(--border);display:flex;gap:10px}
.dim-box{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px;text-align:center}
.dim-box label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.dim-box span{font-size:15px;font-weight:700;background:var(--teal-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pdf-link-wrap{padding:12px 22px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.web2-links{display:flex;gap:8px}
.pdf-link{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:7px;padding:9px 12px;font-size:11px;font-weight:700;text-decoration:none;text-transform:uppercase;letter-spacing:.05em;transition:opacity .15s;text-align:center}
.pdf-link:hover{opacity:.82}
.pdf-link-internal{background:rgba(79,195,247,.12);border:1px solid rgba(79,195,247,.25);color:var(--blue)}
.pdf-link-external{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.22);color:var(--green)}
.pdf-path{font-size:10px;color:var(--muted);word-break:break-all;padding:0 2px}
.panel-files{padding:14px 22px;flex:1}
.panel-files h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
.file-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--bg);transition:border-color .15s,background .15s}
.file-item:hover{border-color:var(--teal);background:rgba(0,196,180,.05)}
.file-ext{font-size:9px;font-weight:700;padding:3px 6px;border-radius:4px;min-width:32px;text-align:center;text-transform:uppercase;background:rgba(239,83,80,.12);color:var(--red);border:1px solid rgba(239,83,80,.2)}
.file-name{font-size:11px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-path-small{font-size:9px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.tc{flex:1;min-height:0;display:flex;flex-direction:column}
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--muted);font-size:12px;text-align:center}
.spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
.sync-dot{position:fixed;bottom:14px;right:16px;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.sync-dot.show{opacity:1}
.sync-dot .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 1s ease-in-out infinite}
.sync-dot.err .dot{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo"><img id="logo-img" alt="Sterling ATM"></div>
  <div class="header-stats" id="header-stats"><span class="stat-pill">Loading...</span></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('main',this)">
    Main <span class="tab-badge" id="badge-main">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('pref',this)">
    Preferred Products <span class="tab-badge tab-badge-gold" id="badge-pref">0</span>
  </button>
</div>

<div class="tab-page active" id="tab-main">
  <div class="layout">
    <aside id="sidebar-main"></aside>
    <main>
      <div class="toolbar"><div class="result-count" id="rc-main"></div></div>
      <div id="tc-main" class="tc"><div class="state-msg"><div class="spinner"></div><div>Loading…</div></div></div>
    </main>
  </div>
</div>

<div class="tab-page" id="tab-pref">
  <div class="layout">
    <aside id="sidebar-pref"></aside>
    <main>
      <div class="toolbar"><div class="result-count" id="rc-pref"></div></div>
      <div id="tc-pref" class="tc"><div class="state-msg"><div style="font-size:32px;opacity:.3">⭐</div><strong style="color:var(--text)">No preferred products yet</strong><span>Click ★ on any row in Main to add it here.</span></div></div>
    </main>
  </div>
</div>

<div id="detail-panel">
  <div class="panel-header">
    <div>
      <div class="panel-unit-no" id="pan-unit">—</div>
      <div class="panel-part-no" id="pan-part"></div>
      <div class="panel-client"  id="pan-client"></div>
    </div>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-meta"    id="pan-meta"></div>
  <div class="dims-row"      id="pan-dims"></div>
  <div class="pdf-link-wrap" id="pan-links"></div>
  <div style="padding:12px 22px;border-bottom:1px solid var(--border)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px">Top Level Part Numbers</div><div id="pan-tlpns"></div></div>
  <div class="panel-files"><h3>PDF Files</h3><div id="pan-files"></div></div>
</div>

// ── Constants ───────────────────────────────────────────────────────────────
const DATA_URL   = './projects.json';
const LS_STARS   = 'pdm_starred_v1';
const COLS = [
  { key:'star',       label:'★',            w:44,  noSort:true },
  { key:'unitNumber', label:'Unit #',        w:90  },
  { key:'fileCount',  label:'P-Line',        w:70  },
  { key:'prodType',   label:'Product Type',  w:130 },
  { key:'client',     label:'Client',        w:130 },
  { key:'drawnBy',    label:'Drawn By',      w:90  },
  { key:'drawnDate',  label:'Drawn Date',    w:90  },
  { key:'atm',        label:'ATM',           w:90  },
  { key:'height',     label:'H',             w:60  },
  { key:'width',      label:'W',             w:60  },
  { key:'depth',      label:'D',             w:60  },
  { key:'tlpns',      label:'TLPNs',         w:80,  noSort:true },
];

// ── State ────────────────────────────────────────────────────────────────────
let allProjects = [];
let projectMap  = {};          // unitNumber → project (O(1) lookups)
let starred     = new Set(JSON.parse(localStorage.getItem(LS_STARS) || '[]')); // local cache, overwritten after API load
const expanded  = new Set(); // units with sub-rows currently expanded
let activeTab   = 'main';
let sort        = { main:{ col:'unitNumber', asc:true }, pref:{ col:'unitNumber', asc:true } };
let filtered    = { main:[], pref:[] };  // cached filtered lists

// ── Persist stars ────────────────────────────────────────────────────────────
// ── Star persistence (JSONBin.io shared store) ───────────────────────────────
// Setup: create a free account at jsonbin.io, make a bin with {"starred":[]},
// then paste your Master Key and Bin ID into the two constants below.
const JSONBIN_KEY    = 'YOUR_MASTER_KEY_HERE';   // X-Master-Key header
const JSONBIN_BIN_ID = 'YOUR_BIN_ID_HERE';       // the bin ID from the URL
const JSONBIN_URL    = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

const CONFIGURED = JSONBIN_KEY !== 'YOUR_MASTER_KEY_HERE' && JSONBIN_BIN_ID !== 'YOUR_BIN_ID_HERE';

let _syncTimer = null;

function saveStars() {
  // 1. Write to localStorage immediately (instant, local)
  const arr = [...starred];
  localStorage.setItem(LS_STARS, JSON.stringify(arr));
  document.getElementById('badge-pref').textContent = starred.size;

  if (!CONFIGURED) return; // no-op if not set up yet

  // 2. Debounce API write — batch rapid star/unstar into one request
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => syncStarsToServer(arr), 800);
}

function showSync(msg, isErr) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-msg');
  txt.textContent = msg;
  dot.classList.toggle('err', !!isErr);
  dot.classList.add('show');
  clearTimeout(dot._hide);
  dot._hide = setTimeout(() => dot.classList.remove('show'), isErr ? 5000 : 2000);
}

async function syncStarsToServer(arr) {
  showSync('Syncing…');
  try {
    const res = await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY,
        'X-Bin-Versioning': 'false',  // overwrite, don't create history versions
      },
      body: JSON.stringify({ starred: arr }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    showSync('Saved ✓');
  } catch (err) {
    console.warn('Star sync failed:', err);
    showSync('Sync failed — saved locally only', true);
  }
}

async function loadStarsFromServer() {
  if (!CONFIGURED) {
    console.warn('PDM: JSONBin not configured — using localStorage only');
    return;
  }
  try {
    const res  = await fetch(`${JSONBIN_URL}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const arr  = data?.record?.starred;
    if (Array.isArray(arr)) {
      starred = new Set(arr);
      localStorage.setItem(LS_STARS, JSON.stringify(arr));
      document.getElementById('badge-pref').textContent = starred.size;
    }
  } catch (err) {
    console.warn('Could not load shared stars, using local cache:', err);
  }
}

function switchTab(name, btn) {

// ── Dropdowns ────────────────────────────────────────────────────────────────
const FILTER_KEYS = ['prodtype','client','drawnby','drawndate','atm','height','width','depth'];
const KEY_MAP = { prodtype:'prodType', client:'client', drawnby:'drawnBy',
                  drawndate:'drawnDate', atm:'atm', height:'height', width:'width', depth:'depth' };

function populateDropdowns(projects, p) {
  FILTER_KEYS.forEach(k => {
    const sel = document.getElementById(`s-${k}-${p}`);
    if (!sel) return;
    const cur = sel.value;
    // Build option list
    const vals = [...new Set(projects.map(pr => pr[KEY_MAP[k]]).filter(v => v?.trim()))].sort();
    // Rebuild only if changed (avoids unnecessary DOM thrash)
    const existing = [...sel.options].slice(1).map(o => o.value);
    if (JSON.stringify(vals) === JSON.stringify(existing)) { sel.value = cur; return; }
    while (sel.options.length > 1) sel.remove(1);
    const frag = document.createDocumentFragment();
    vals.forEach(v => { const o = document.createElement('option'); o.value = o.textContent = v; frag.appendChild(o); });
    sel.appendChild(frag);
    if (cur && vals.includes(cur)) sel.value = cur;
  });
}

// ── Filters ──────────────────────────────────────────────────────────────────
function getFilters(p) {
  const g = k => (document.getElementById(`s-${k}-${p}`) || {}).value || '';
  return {
    search:   (document.getElementById('s-search-' + p) || {}).value?.trim().toLowerCase() || '',
    prodType: g('prodtype'), client:g('client'), drawnBy:g('drawnby'),
    drawnDate:g('drawndate'), atm:g('atm'), height:g('height'), width:g('width'), depth:g('depth'),
  };
}

function filterList(projects, f) {
  return projects.filter(p => {
    if (f.search && ![p.unitNumber,p.partNo,p.prodType,p.client,p.atm,p.drawnBy]
          .some(v => v?.toLowerCase().includes(f.search))) return false;
    if (f.prodType  && p.prodType  !== f.prodType)  return false;
    if (f.client    && p.client    !== f.client)    return false;
    if (f.drawnBy   && p.drawnBy   !== f.drawnBy)   return false;
    if (f.drawnDate && p.drawnDate !== f.drawnDate) return false;
    if (f.atm       && p.atm       !== f.atm)       return false;
    if (f.height    && p.height    !== f.height)    return false;
    if (f.width     && p.width     !== f.width)     return false;
    if (f.depth     && p.depth     !== f.depth)     return false;
    return true;
  });
}

function applyFilters(p) {
  const pool = p === 'pref'
    ? allProjects.filter(pr => starred.has(pr.unitNumber))
    : allProjects;
  if (p === 'pref') populateDropdowns(pool, 'pref');
  filtered[p] = filterList(pool, getFilters(p));
  renderTable(p);
}

function clearFilters(p) {
  document.getElementById('s-search-' + p).value = '';
  FILTER_KEYS.forEach(k => { const el = document.getElementById(`s-${k}-${p}`); if (el) el.value = ''; });
  applyFilters(p);
}

// ── Expand/collapse TLPN sub-rows ────────────────────────────────────────────
function toggleExpand(unit, btn) {
  if (expanded.has(unit)) {
    expanded.delete(unit);
    btn.classList.remove('open');
    document.querySelectorAll(`.sub-row[data-unit="${unit}"]`).forEach(r => r.remove());
  } else {
    expanded.add(unit);
    btn.classList.add('open');
    // Sub-rows are injected by paintRows after re-render
    paintRows(activeTab);
  }
}

// ── Star toggle ───────────────────────────────────────────────────────────────
function toggleStar(unit, e) {
  e.stopPropagation();
  if (starred.has(unit)) starred.delete(unit); else starred.add(unit);
  saveStars();

  // Update star buttons in-place without full re-render
  const on = starred.has(unit);
  document.querySelectorAll(`.star-btn[data-unit="${unit}"]`).forEach(btn => {
    btn.classList.toggle('starred', on);
    btn.title = on ? 'Remove from Preferred' : 'Add to Preferred';
  });
}

// ── Virtual table renderer ────────────────────────────────────────────────────
// Renders only visible rows + overscan. Sorted rows cached in vState per tab.
const ROW_H   = 37;   // px per row (must match td padding)
const OVERSCAN = 15;  // extra rows above/below viewport

const vState = {
  main: { sorted:[], scrollEl:null },
  pref: { sorted:[], scrollEl:null },
};

function renderTable(p) {
  const s   = sort[p];
  const col = s.col;
  const asc = s.asc;

  // Sort once, cache
  vState[p].sorted = [...filtered[p]].sort((a, b) => {
    const va = String(a[col] ?? '').toLowerCase();
    const vb = String(b[col] ?? '').toLowerCase();
    return asc ? va.localeCompare(vb, undefined, {numeric:true})
               : vb.localeCompare(va, undefined, {numeric:true});
  });

  const rows = vState[p].sorted;

  document.getElementById('rc-' + p).innerHTML =
    `<b>${rows.length}</b> unit${rows.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('tc-' + p);

  if (rows.length === 0) {
    container.innerHTML = p === 'pref'
      ? `<div class="state-msg"><div style="font-size:32px;opacity:.3">⭐</div><strong style="color:var(--text)">No preferred products yet</strong><span>Click ★ on any row in Main to add it here.</span></div>`
      : `<div class="state-msg">No projects match the current filters.</div>`;
    vState[p].scrollEl = null;
    return;
  }

  // Build colgroup
  let cg = '';
  COLS.forEach(c => { cg += `<col id="col-${c.key}-${p}" style="width:${c.w}px">`; });

  // Build header
  let hd = '';
  COLS.forEach(c => {
    const sorted = !c.noSort && col === c.key;
    hd += `<th class="${c.noSort?'':'sortable'}${sorted?' sorted':''}"
      ${c.noSort ? '' : `onclick="sortBy('${c.key}','${p}')"`}
      ><span>${c.label}</span>${c.noSort ? '' : `<span class="sa">${sorted ? (asc?'↑':'↓') : '↕'}</span>`}
      <div class="col-resizer" onmousedown="startResize(event,'${c.key}','${p}')"></div></th>`;
  });

  // Scaffold: table-wrap scrolls, inner table has spacer rows
  container.innerHTML =
    `<div class="table-wrap" id="vscroll-${p}">
       <table><colgroup>${cg}</colgroup>
         <thead><tr>${hd}</tr></thead>
         <tbody id="vbody-${p}"></tbody>
       </table>
     </div>`;

  const scrollEl = document.getElementById('vscroll-' + p);
  vState[p].scrollEl = scrollEl;
  scrollEl.scrollTop = 0;

  // Attach scroll listener (passive for perf)
  scrollEl.addEventListener('scroll', () => paintRows(p), { passive: true });

  paintRows(p);
}

function paintRows(p) {
  const scrollEl = vState[p].scrollEl;
  const rows     = vState[p].sorted;
  if (!scrollEl || !rows.length) return;

  const tbody    = document.getElementById('vbody-' + p);
  if (!tbody) return;

  const viewH    = scrollEl.clientHeight;
  const scrollY  = scrollEl.scrollTop;
  const total    = rows.length;
  const totalH   = total * ROW_H;

  const firstVis = Math.max(0, Math.floor(scrollY / ROW_H) - OVERSCAN);
  const lastVis  = Math.min(total - 1, Math.ceil((scrollY + viewH) / ROW_H) + OVERSCAN);

  const topPad    = firstVis * ROW_H;
  const bottomPad = (total - 1 - lastVis) * ROW_H;

  const dash = '<span class="dash">—</span>';
  let rb = '';

  // Top spacer
  if (topPad > 0) rb += `<tr style="height:${topPad}px"><td colspan="${COLS.length}"></td></tr>`;

  for (let i = firstVis; i <= lastVis; i++) {
    const r  = rows[i];
    const st = starred.has(r.unitNumber);
    const u  = esc(r.unitNumber);
    rb += `<tr onclick="showDetail('${u}')">` +
      `<td class="col-star"><button class="star-btn${st?' starred':''}" data-unit="${u}" onclick="toggleStar('${u}',event)" title="${st?'Remove from Preferred':'Add to Preferred'}">★</button></td>` +
      `<td class="col-unit">${u||dash}</td>` +
      `<td><span class="badge badge-count">${r.fileCount}</span></td>` +
      `<td>${r.prodType?`<span class="badge badge-type">${esc(r.prodType)}</span>`:dash}</td>` +
      `<td>${esc(r.client)||dash}</td>` +
      `<td>${esc(r.drawnBy)||dash}</td>` +
      `<td class="col-muted">${esc(r.drawnDate)||dash}</td>` +
      `<td style="font-size:11px">${esc(r.atm)||dash}</td>` +
      `<td class="col-dim">${esc(r.height)||dash}</td>` +
      `<td class="col-dim">${esc(r.width)||dash}</td>` +
      `<td class="col-dim">${esc(r.depth)||dash}</td>` +
      `<td class="col-tlpn">${r.tlpns&&r.tlpns.length?`<span class="badge badge-tlpn" title="${r.tlpns.map(t=>typeof t==='object'?t.tlpn||t.name||'':t).join('\n')}">${r.tlpns.length}</span>`:dash}</td>` +
      `</tr>`;
  }

  // Bottom spacer
  if (bottomPad > 0) rb += `<tr style="height:${bottomPad}px"><td colspan="${COLS.length}"></td></tr>`;

  tbody.innerHTML = rb;
}

function sortBy(col, p) {
  const s = sort[p];
  if (s.col === col) s.asc = !s.asc; else { s.col = col; s.asc = true; }
  renderTable(p);
}

// ── Column resize ─────────────────────────────────────────────────────────────
let _r = null;
function startResize(e, key, p) {
  e.stopPropagation(); e.preventDefault();
  const el  = document.getElementById(`col-${key}-${p}`);
  const col = COLS.find(c => c.key === key);
  _r = { key, p, x: e.clientX, w: el ? el.offsetWidth : col.w, el, col, handle: e.currentTarget };
  _r.handle.classList.add('dragging');
  document.addEventListener('mousemove', _onRM);
  document.addEventListener('mouseup',   _onRU);
}
function _onRM(e) {
  if (!_r) return;
  const nw = Math.max(36, _r.w + e.clientX - _r.x);
  if (_r.el) _r.el.style.width = nw + 'px';
  if (_r.col) _r.col.w = nw;
}
function _onRU() {
  if (_r?.handle) _r.handle.classList.remove('dragging');
  _r = null;
  document.removeEventListener('mousemove', _onRM);
  document.removeEventListener('mouseup',   _onRU);
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function showDetail(unit) {
  const p = projectMap[unit];
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('pan-unit').textContent   = unit;
  document.getElementById('pan-part').textContent   = p?.partNo   ? `Part No: ${p.partNo}`  : '';
  document.getElementById('pan-client').textContent = p?.client   ? `Client: ${p.client}`   : '';

  if (!p) { document.getElementById('pan-files').innerHTML = '<div class="state-msg">⚠ Not found.</div>'; return; }

  document.getElementById('pan-meta').innerHTML = `
    <div class="meta-item"><label>Part No.</label>     <span>${esc(p.partNo)   ||'—'}</span></div>
    <div class="meta-item"><label>Product Type</label> <span>${esc(p.prodType) ||'—'}</span></div>
    <div class="meta-item"><label>Client</label>       <span>${esc(p.client)   ||'—'}</span></div>
    <div class="meta-item"><label>ATM</label>          <span>${esc(p.atm)      ||'—'}</span></div>
    <div class="meta-item"><label>Drawn By</label>     <span>${esc(p.drawnBy)  ||'—'}</span></div>
    <div class="meta-item"><label>Drawn Date</label>   <span>${esc(p.drawnDate)||'—'}</span></div>`;

  document.getElementById('pan-dims').innerHTML = `
    <div class="dim-box"><label>Height</label><span>${esc(p.height)||'—'}</span></div>
    <div class="dim-box"><label>Width</label> <span>${esc(p.width) ||'—'}</span></div>
    <div class="dim-box"><label>Depth</label> <span>${esc(p.depth) ||'—'}</span></div>`;

  // TLPNs section
  const tlpnEl = document.getElementById('pan-tlpns');
  if (tlpnEl) {
    const tlpns = p.tlpns || [];
    tlpnEl.innerHTML = tlpns.length === 0
      ? '<span style="color:var(--muted);font-size:11px">None on record</span>'
      : tlpns.map(t => {
        const isObj = typeof t === 'object' && t !== null;
        const name  = isObj ? (t.tlpn || t.name || '') : t;
        const bank  = isObj && t.bankName ? ` — ${t.bankName}` : '';
        return `<span class="badge badge-tlpn" style="margin:2px 3px 2px 0;display:inline-block" title="${esc(name)}">${esc(name)}${esc(bank)}</span>`;
      }).join('');
  }

  const pp = `Projects/${encodeURIComponent(unit)}/Documentation/PDF`;
  document.getElementById('pan-links').innerHTML = `
    <div class="web2-links">
      <a class="pdf-link pdf-link-internal" href="http://10.10.11.15/satm_pdm/#/folder/${pp}" target="_blank">🏢 Internal</a>
      <a class="pdf-link pdf-link-external" href="http://50.206.38.114/satm_pdm/#/folder/${pp}" target="_blank">🌐 External</a>
    </div>
    <div class="pdf-path">PDM Web2 → ${esc(unit)} / Documentation / PDF</div>`;

  const files = p.files || [];
  document.getElementById('pan-files').innerHTML = files.length === 0
    ? `<div class="state-msg" style="padding:20px;font-size:11px">No PDFs indexed for <b>${esc(unit)}</b></div>`
    : files.map(f => {
        const uri = f.pdfUrl || ('file:///' + ('\\\\main\\ENGINEERING\\PDM P lines\\' + f.fileName).replace(/\\/g,'/'));
        const lbl = f.pdfUrl ? 'Open PDF' : '\\\\main\\ENGINEERING\\PDM P lines';
        return `<a class="file-item" href="${uri}" target="_blank" style="text-decoration:none">
          <div class="file-ext">PDF</div>
          <div style="flex:1;overflow:hidden"><div class="file-name">${esc(f.fileName)}</div><div class="file-path-small">${lbl}</div></div>
          <div style="color:var(--teal);font-size:14px;flex-shrink:0">↗</div></a>`;
      }).join('');
}

function closePanel() { document.getElementById('detail-panel').classList.remove('open'); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}
function fmtDate(iso) {
  if (!iso || iso === 'Never') return iso || '—';
  try { return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }
  catch { return iso; }
}
